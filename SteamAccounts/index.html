<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>BooDS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0d, #111119, #0b0b12);
      color: #fff;
      overflow-x: hidden;
    }

    /* تأثير إضاءة خفيفة */
    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 70%);
      top: -100px;
      right: -100px;
      filter: blur(40px);
      z-index: -1;
    }

    .glow2 {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,0,120,0.25), transparent 70%);
      bottom: -120px;
      left: -120px;
      filter: blur(40px);
      z-index: -1;
    }

    /* الهيدر */
    header {
      padding: 18px 25px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      letter-spacing: 1px;
      text-shadow: 0 0 12px #005eff;
    }

    /* المحتوى */
    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #4da6ff;
      text-shadow: 0 0 12px #0077ff;
    }

    p {
      font-size: 17px;
      color: #d1d1d1;
      line-height: 1.8;
      margin-bottom: 40px;
    }

    /* الأزرار */
    .btns {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      color: #fff;
      background: #1a1a22;
      border: 1px solid #333;
      transition: 0.25s;
      font-size: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .btn:hover {
      background: #4da6ff;
      border-color: #4da6ff;
      color: #000;
      transform: translateY(-3px);
      box-shadow: 0 0 18px #4da6ff;
    }

    /* فوتر */
    footer {
      margin-top: 60px;
      padding: 15px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="glow2"></div>

  <header>BooDS</header>

  <div class="container">
    <h1>مرحباً بك في BooDS</h1>
    <p>
      هنا تلاقي حسابات ألعاب بأسعار بسيطة تبدأ من 1 دولار.  
      كل شيء واضح وسهل وسريع بدون تعقيد.
    </p>

    <div class="btns">
      <a href="htmls/trqTwasl.html" class="btn">طرق التواصل</a>
      <a href="htmls/priceAccounts.html" class="btn">أسعار الحسابات</a>
      <a href="htmls/creator.html" class="btn">المطور</a>
    </div>
  </div>

  <footer>© BooDS — 2026</footer>

</body>
</html>
