<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>أسعار الحسابات - BooDS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0d, #111119, #0b0b12);
      color: #fff;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 70%);
      top: -100px;
      right: -100px;
      filter: blur(40px);
      z-index: -1;
    }

    .glow2 {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,0,120,0.25), transparent 70%);
      bottom: -120px;
      left: -120px;
      filter: blur(40px);
      z-index: -1;
    }

    header {
      padding: 18px 25px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 12px #005eff;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    h1 {
      text-align: center;
      font-size: 34px;
      margin-bottom: 30px;
      color: #4da6ff;
      text-shadow: 0 0 12px #0077ff;
    }

    /* زر الرجوع */
    .back-btn {
      display: inline-block;
      margin-bottom: 25px;
      padding: 10px 20px;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      transition: 0.25s;
      font-size: 14px;
    }

    .back-btn:hover {
      background: #4da6ff;
      border-color: #4da6ff;
      color: #000;
      box-shadow: 0 0 15px #4da6ff;
      transform: translateY(-3px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid #333;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      text-align: center;
      border-bottom: 1px solid #222;
      font-size: 15px;
    }

    th {
      background: rgba(77,166,255,0.15);
      color: #4da6ff;
      font-size: 16px;
    }

    tr:hover {
      background: rgba(255,255,255,0.07);
    }

    footer {
      margin-top: 60px;
      padding: 15px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="glow2"></div>

  <header>أسعار الحسابات</header>

  <div class="container">

    <a href="../index.html" class="back-btn">⬅ رجوع</a>

    <h1>القائمة المتوفرة حالياً | عروض!</h1>

    <table>
      <tr>
        <th>#</th>
        <th>اسم اللعبة</th>
        <th>المنصة</th>
        <th>السعر</th>
      </tr>

      <tr>
        <td>1</td>
        <td>Poppy Playtime (All Chapters)</td>
        <td>Steam</td>
        <td>$0</td>
      </tr>
	  
	  <tr>
        <td>2</td>
        <td>Peak , Beamng.Drive</td>
        <td>Steam</td>
        <td>$0</td>
      </tr>

    </table>
  </div>

  <footer>© BooDS — 2026</footer>

</body>
</html>
