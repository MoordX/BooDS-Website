<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>طرق التواصل - BooDS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0a0a0d, #111119, #0b0b12);
      color: #fff;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 70%);
      top: -100px;
      right: -100px;
      filter: blur(40px);
      z-index: -1;
    }

    .glow2 {
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,0,120,0.25), transparent 70%);
      bottom: -120px;
      left: -120px;
      filter: blur(40px);
      z-index: -1;
    }

    header {
      padding: 18px 25px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #4da6ff;
      text-shadow: 0 0 12px #005eff;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    /* زر الرجوع */
    .back-btn {
      display: inline-block;
      margin-bottom: 25px;
      padding: 10px 20px;
      background: #1a1a22;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      transition: 0.25s;
      font-size: 14px;
    }

    .back-btn:hover {
      background: #4da6ff;
      border-color: #4da6ff;
      color: #000;
      box-shadow: 0 0 15px #4da6ff;
      transform: translateY(-3px);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
      color: #4da6ff;
      text-shadow: 0 0 12px #0077ff;
    }

    p {
      font-size: 16px;
      color: #d1d1d1;
      margin-bottom: 40px;
      line-height: 1.8;
    }

    .contact-box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #333;
      margin-bottom: 20px;
      transition: 0.25s;
    }

    .contact-box:hover {
      background: rgba(77,166,255,0.15);
      border-color: #4da6ff;
      transform: translateY(-3px);
      box-shadow: 0 0 18px #4da6ff;
    }

    .contact-title {
      font-size: 20px;
      margin-bottom: 8px;
      color: #4da6ff;
    }

    a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
    }

    footer {
      margin-top: 60px;
      padding: 15px;
      text-align: center;
      color: #777;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="glow"></div>
  <div class="glow2"></div>

  <header>طرق التواصل</header>

  <div class="container">

    <a href="../index.html" class="back-btn">⬅ رجوع</a>

    <h1>تواصل معنا بسهولة</h1>
    <p>اختر الطريقة اللي تناسبك للتواصل مع BooDS.</p>

    <div class="contact-box">
      <div class="contact-title">Discord</div>
      <a href="https://discord.gg/tdW36xsf" target="_blank">
        https://discord.gg/tdW36xsf
      </a>
    </div>

    <div class="contact-box">
      <div class="contact-title">Call</div>
      <a href="tel:+966560983152">+966560983152</a>
    </div>

  </div>

  <footer>© BooDS — 2026</footer>

</body>
</html>
